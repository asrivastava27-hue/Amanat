name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Prepare build environment files
      run: |
        touch .env
        touch .env.example
        if [ ! -f app/google-services.json ]; then
          cat << 'EOF' > app/google-services.json
        {
          "project_info": {
            "project_number": "108202111114",
            "project_id": "amanat-a3b65",
            "storage_bucket": "amanat-a3b65.firebasestorage.app"
          },
          "client": [
            {
              "client_info": {
                "mobilesdk_app_id": "1:108202111114:android:9b2575be9e7ccbaa4d7d73",
                "android_client_info": {
                  "package_name": "com.aistudio.amanat.kxmpzq"
                }
              },
              "oauth_client": [],
              "api_key": [
                {
                  "current_key": "AIzaSyC7RAFfTu9_EQBhcaqMgd9pwFcD3ily2wY"
                }
              ],
              "services": {
                "appinvite_service": {
                  "other_platform_oauth_client": []
                }
              }
            }
          ],
          "configuration_version": "1"
        }
        EOF
        fi

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Amanat-App-APK
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Create or Update Release
      if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
      uses: softprops/action-gh-release@v2
      with:
        files: app/build/outputs/apk/debug/app-debug.apk
        tag_name: v1.0.0
        name: "Amanat App APK v1.0.0"
        body: "Download `app-debug.apk` directly on your mobile device to test."
        allowUpdates: true
